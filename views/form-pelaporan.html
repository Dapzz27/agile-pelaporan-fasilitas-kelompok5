<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pelaporan Kerusakan - Sikampus</title>
    <link rel="stylesheet" href="/css/form-pelaporan.css">
</head>
<body>

    <div class="container">
        <div class="card">
            
            <div class="form-header">
                <h2>Form Pelaporan Kerusakan</h2>
                <p>Silakan isi detail kendala atau kerusakan fasilitas kampus dengan lengkap.</p>
            </div>

            <form action="/laporan" method="POST" enctype="multipart/form-data" id="form-pelaporan">

                <div class="form-group">
                    <label for="kategori">Kategori Kerusakan</label>
                    <input type="text" id="kategori" name="kategori" placeholder="Contoh: AC Mati, Lampu Putus" required>
                </div>

                <div class="form-group">
                    <label for="lokasi">Lokasi</label>
                    <input type="text" id="lokasi" name="lokasi" placeholder="Contoh: Gedung B Ruang 301" required>
                </div>

                <div class="form-group">
                    <label for="deskripsi">Deskripsi Kerusakan</label>
                    <textarea id="deskripsi" name="deskripsi" rows="4" placeholder="Jelaskan detail kronologi atau kondisi kerusakan..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="urgensi">Tingkat Urgensi</label>
                    <div class="select-wrapper">
                        <select id="urgensi" name="urgensi" required>
                            <option value="">Pilih Tingkat Urgensi</option>
                            <option value="Rendah">🟢 Rendah</option>
                            <option value="Sedang">🟡 Sedang</option>
                            <option value="Tinggi">🔴 Tinggi</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="foto">Upload Foto Bukti</label>
                    <div class="file-upload-zone">
                        <input type="file" id="foto" name="foto" required>
                        <div class="file-upload-text" id="upload-text">
                            <span class="icon">📁</span>
                            <span class="text-main">Klik atau drag file foto ke sini</span>
                            <p>Format: JPG, JPEG, PNG (Maks. 5MB)</p>
                        </div>
                    </div>
                </div>

                <button type="submit">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    Kirim Laporan
                </button>

            </form>

            <div class="back-link">
                <a href="/dashboard-pelapor">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Kembali ke Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('foto');
        const uploadText = document.getElementById('upload-text');
        const formPelaporan = document.getElementById('form-pelaporan');

        // Menampilkan nama file saat foto sukses dipilih
        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                const fileName = this.files[0].name;
                uploadText.innerHTML = `
                    <span class="icon" style="color: #2563eb;">✅</span>
                    <span class="text-main" style="color: #2563eb;">${fileName}</span>
                    <p>Berhasil dipilih. Klik lagi untuk mengganti berkas.</p>
                `;
            }
        });

        // Mencegat submit untuk menyimpan data ke memori lokal browser terlebih dahulu
        formPelaporan.addEventListener('submit', function() {
            const kategoriValue = document.getElementById('kategori').value;
            const lokasiValue = document.getElementById('lokasi').value;

            // Ambil data array laporan yang sudah ada di memori browser
            const laporanLokal = JSON.parse(localStorage.getItem('laporanLokal')) || [];
            
            // Membuat baris objek laporan baru secara dinamis
            const dataBaru = {
                id: `#00${laporanLokal.length + 3}`, // Melanjutkan ID statis bawaan (#003, #004, dst)
                kategori: kategoriValue,
                lokasi: lokasiValue,
                status: 'Dilaporkan'
            };

            // Masukkan data baru ke dalam array, lalu save kembali ke browser
            laporanLokal.push(dataBaru);
            localStorage.setItem('laporanLokal', JSON.stringify(laporanLokal));
        });
    </script>

</body>
</html>
