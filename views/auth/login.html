<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <img src="/images/Logo_UnivLampung.png" alt="Logo Unila">

            <h2>Login</h2>
            <p>Sistem Pelaporan Fasilitas Kampus</p>

            <form>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Masukkan Email">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Masukkan Password">
                </div>

                <button type="submit">
                    Masuk
                </button>

            </form>

            <div class="footer">
                Belum punya akun?
                <a href="/register">Daftar</a>
            </div>

        </div>

    </div>

</body>

</html>
