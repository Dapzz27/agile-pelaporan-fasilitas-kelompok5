<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar</title>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <img src="/images/Logo_UnivLampung.png" alt="Logo Unila">

            <h2>Daftar Akun</h2>
            <p>Sistem Pelaporan Fasilitas Kampus</p>

            <form id="registerForm">

                <div class="form-row">
                    <div class="form-group">
                        <label>Nama Depan</label>
                        <input type="text" placeholder="Nama depan">
                    </div>
                    <div class="form-group">
                        <label>Nama Belakang</label>
                        <input type="text" placeholder="Nama belakang">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Masukkan Email">
                </div>

                <div class="form-group">
                    <label>NIM / NIP</label>
                    <input type="text" placeholder="Masukkan NIM atau NIP">
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select>
                        <option value="" disabled selected>Pilih Role</option>
                        <option value="mahasiswa">Mahasiswa</option>
                        <option value="dosen">Dosen / Staff</option>
                    </select>
                </div>

                <div class="divider">Keamanan Akun</div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw1" placeholder="Buat Password" oninput="checkStrength(this.value)">
                        <button type="button" class="toggle-pw" onclick="togglePw('pw1', this)">&#128065;</button>
                    </div>
                    <div class="strength-bar"><span id="strengthBar"></span></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="pw2" placeholder="Ulangi Password">
                        <button type="button" class="toggle-pw" onclick="togglePw('pw2', this)">&#128065;</button>
                    </div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="agreeTerms">
                    <label for="agreeTerms">
                        Saya menyetujui <a href="#">Syarat &amp; Ketentuan</a> serta
                        <a href="#">Kebijakan Privasi</a> yang berlaku.
                    </label>
                </div>

                <button type="submit">Daftar Sekarang</button>

            </form>

            <div class="footer">
                Sudah punya akun?
                <a href="/login">Masuk</a>
            </div>

        </div>

    </div>

    <script src="/js/register.js"></script>

</body>

</html>
